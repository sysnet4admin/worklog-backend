---
apiVersion: v1
kind: Secret
metadata:
  name: worklog-mongodb-creds
data:
  username: cm9vdA==          # root
  password: bXlwYXNzdzByZA==  # mypassw0rd
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worklog-backend
spec:
  selector:
    matchLabels:
      app: worklog-backend
  replicas: 1
  template:
    metadata:
      labels:
        app: worklog-backend
    spec:
      containers:
      - name: worklog-backend
        image: sysnet4admin/worklog-backend:dev-68551d0
        ports:
        - containerPort: 80
        env:
        - name: MONGO_HOST
          value: worklog-mongodb.default.svc.cluster.local
        - name: IMAGE_TAG
          value: "v1.0.0" # IMAGE_TAG
        - name: MONGO_INITDB_ROOT_USERNAME
          valueFrom:
            secretKeyRef:
              name: worklog-mongodb-creds
              key: username
        - name: MONGO_INITDB_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: worklog-mongodb-creds
              key: password
        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 6
        readinessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: worklog-backend
  labels:
    app: worklog-backend
spec:
  ports:
    - name: http
      port: 80
  selector:
    app: worklog-backend
  type: ClusterIP
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: worklog-backend
spec:
  parentRefs:
  - name: nginx-gateway
  hostnames:
  - worklog-backend.myk8s.local
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: worklog-backend
      port: 80
