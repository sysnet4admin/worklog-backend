name: Backend Build and Deploy
concurrency:
  group: worklog-backend-deploy-${{ github.ref }}
  cancel-in-progress: false

on:
  push:
    branches: [main]
    paths-ignore:
      - 'deploy_manifest/**'

env:
  DOCKER_REPOSITORY: sysnet4admin/worklog-backend

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.12'
      - name: Run tests
        run: |
          uv sync --extra dev
          export TESTING=true
          uv run coverage run --source ./src/worklog -m pytest --disable-warnings -v
          uv run coverage report

  build:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      short_sha: ${{ steps.vars.outputs.short_sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Set variables
        id: vars
        run: echo "short_sha=$(echo ${{ github.sha }} | cut -c1-8)" >> $GITHUB_OUTPUT
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Docker login
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
      - name: Build and push
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            -t ${{ env.DOCKER_REPOSITORY }}:${{ steps.vars.outputs.short_sha }} \
            --push .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Update manifest and push
        run: |
          sed -i "s|image: .*worklog-backend:.*|image: ${{ env.DOCKER_REPOSITORY }}:${{ needs.build.outputs.short_sha }}|" deploy_manifest/worklog-backend.yaml
          sed -i "s|value: .* # IMAGE_TAG|value: ${{ needs.build.outputs.short_sha }} # IMAGE_TAG|" deploy_manifest/worklog-backend.yaml
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add deploy_manifest/
          git commit -m "deploy: update backend image tag to ${{ needs.build.outputs.short_sha }}"
          git pull --rebase origin main
          git push origin main
