name: Multi-Environment Deploy

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, develop, 'release/*']
    tags: ['v*']
    paths-ignore:
      - 'deploy_manifest/**'

env:
  DOCKER_REPOSITORY: sysnet4admin/worklog-backend
  DOCKERHUB_USERNAME: sysnet4admin
  DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

jobs:
  determine-environment:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.set-env.outputs.environment }}
      namespace: ${{ steps.set-env.outputs.namespace }}
      image_tag: ${{ steps.set-env.outputs.image_tag }}
    steps:
      - name: Determine target environment
        id: set-env
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "environment=dev" >> $GITHUB_OUTPUT
            echo "namespace=dev" >> $GITHUB_OUTPUT
            echo "image_tag=pr-${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/heads/develop ]]; then
            echo "environment=dev" >> $GITHUB_OUTPUT
            echo "namespace=dev" >> $GITHUB_OUTPUT
            SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-8)
            echo "image_tag=dev-${SHORT_SHA}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/heads/release/* ]]; then
            echo "environment=staging" >> $GITHUB_OUTPUT
            echo "namespace=staging" >> $GITHUB_OUTPUT
            SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-8)
            echo "image_tag=staging-${SHORT_SHA}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "environment=prod" >> $GITHUB_OUTPUT
            echo "namespace=prod" >> $GITHUB_OUTPUT
            TAG=${GITHUB_REF#refs/tags/}
            echo "image_tag=${TAG}" >> $GITHUB_OUTPUT
          else
            echo "environment=dev" >> $GITHUB_OUTPUT
            echo "namespace=dev" >> $GITHUB_OUTPUT
            SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-8)
            echo "image_tag=dev-${SHORT_SHA}" >> $GITHUB_OUTPUT
          fi

  init-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.12'
      - name: Run test
        run: |
          uv sync --extra dev
          export TESTING=true
          uv run coverage run --source ./src/worklog -m pytest --disable-warnings -v
          uv run coverage report

  build:
    runs-on: ubuntu-latest
    needs: [determine-environment, init-and-test]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Docker login
        run: |
          echo ${{ env.DOCKERHUB_TOKEN }} | docker login --username ${{ env.DOCKERHUB_USERNAME }} --password-stdin
      - name: Build and push
        run: |
          IMAGE_TAG=${{ needs.determine-environment.outputs.image_tag }}
          docker buildx build --platform linux/amd64,linux/arm64 --push \
            -t ${{ env.DOCKER_REPOSITORY }}:${IMAGE_TAG} \
            -t ${{ env.DOCKER_REPOSITORY }}:latest \
            .
          echo "build successful and published image with tag: ${IMAGE_TAG}"

  deploy:
    runs-on: ubuntu-latest
    needs: [determine-environment, build]
    environment: ${{ needs.determine-environment.outputs.environment }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Update manifest and push
        run: |
          IMAGE_TAG=${{ needs.determine-environment.outputs.image_tag }}
          NAMESPACE=${{ needs.determine-environment.outputs.namespace }}
          sed -i "s|image: .*worklog-backend:.*|image: ${{ env.DOCKER_REPOSITORY }}:${IMAGE_TAG}|" deploy_manifest/worklog-backend.yaml
          sed -i "s|value: .* # IMAGE_TAG|value: ${IMAGE_TAG} # IMAGE_TAG|" deploy_manifest/worklog-backend.yaml
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add deploy_manifest/
          git diff --staged --quiet || git commit -m "deploy: update image tag to ${IMAGE_TAG} for ${NAMESPACE}"
          BRANCH=$(echo "${GITHUB_REF#refs/heads/}" | grep -v "^$" || echo "${GITHUB_HEAD_REF}")
          git pull --rebase origin ${BRANCH}
          git push origin HEAD:${BRANCH}

  notify-success-result:
    if: ${{ success() }}
    runs-on: ubuntu-latest
    needs: [determine-environment, build, deploy]
    steps:
      - name: Notification Success
        run: |
          echo "Pipeline completed successfully"
          echo "Environment: ${{ needs.determine-environment.outputs.environment }}"
          echo "Namespace: ${{ needs.determine-environment.outputs.namespace }}"
          echo "Image Tag: ${{ needs.determine-environment.outputs.image_tag }}"

  notify-failure-result:
    if: ${{ failure() }}
    runs-on: ubuntu-latest
    needs: [determine-environment, build, deploy]
    steps:
      - name: Notification Failure
        run: |
          echo "Pipeline failed"
          echo "Environment: ${{ needs.determine-environment.outputs.environment }}"
          echo "Namespace: ${{ needs.determine-environment.outputs.namespace }}"
          echo "Image Tag: ${{ needs.determine-environment.outputs.image_tag }}"
