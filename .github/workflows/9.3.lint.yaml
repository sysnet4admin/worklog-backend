name: Lint

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, develop, 'release/*']
    paths-ignore:
      - 'deploy_manifest/**'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.12'
      - name: Run lint
        run: |
          uv sync --extra dev
          uv run ruff check src/
