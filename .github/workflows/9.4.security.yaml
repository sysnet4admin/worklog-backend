name: Security Scan

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, develop, 'release/*']
    paths-ignore:
      - 'deploy_manifest/**'

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.12'
      - name: Dependency vulnerability scan
        run: |
          uv sync --extra dev
          uv run pip-audit
      - name: Secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
