name: worklog backend pipeline (Argo CD)
concurrency:
  group: worklog-backend-deploy-${{ github.ref }}
  cancel-in-progress: false

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'deploy_manifest/**'

env:
  DOCKER_REPOSITORY: sysnet4admin/worklog-backend
  DOCKERHUB_USERNAME: sysnet4admin
  DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

jobs:
  init-and-test:
    runs-on: ubuntu-latest
    outputs:
      full_sha: ${{ steps.vars.outputs.full_sha }}
      short_sha: ${{ steps.vars.outputs.short_sha }}
      branch: ${{ steps.vars.outputs.branch }}
      commit_message: ${{ steps.vars.outputs.commit_message }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.12'
      - id: vars
        name: init variables
        run: |
          full_sha=${{ github.sha }}
          short_sha=$(echo ${full_sha} | cut -c1-8)
          branch=$(echo ${GITHUB_REF#refs/heads/} | tr '/' '-')
          commit_message=$(git log -1 --format="*%s* by _%an_")

          echo "full_sha=${full_sha}" >> $GITHUB_OUTPUT
          echo "short_sha=${short_sha}" >> $GITHUB_OUTPUT
          echo "branch=${branch}" >> $GITHUB_OUTPUT
          echo "commit_message=${commit_message}" >> $GITHUB_OUTPUT
      - name: Notify starting
        run: |
          echo "Sending a 'start' notification to Slack for build ${{ steps.vars.outputs.short_sha }}"
      - name: Run test
        run: |
          echo "running test for ${{ steps.vars.outputs.full_sha }}"
          uv sync --extra dev
          export TESTING=true
          uv run coverage run --source ./src/worklog -m pytest --disable-warnings -v
          uv run coverage report

  build:
    runs-on: ubuntu-latest
    needs: [init-and-test]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image
        run: |
          echo "Let's build the image for ${{ needs.init-and-test.outputs.full_sha }}"
          echo ${{ env.DOCKERHUB_TOKEN }} | docker login --username ${{ env.DOCKERHUB_USERNAME }} --password-stdin
          docker buildx build . \
            --platform linux/amd64,linux/arm64 \
            -t ${{ env.DOCKER_REPOSITORY }}:${{ needs.init-and-test.outputs.full_sha }} \
            -t ${{ env.DOCKER_REPOSITORY }}:${{ needs.init-and-test.outputs.short_sha }} \
            --push
          echo "Tags: ${{ needs.init-and-test.outputs.short_sha }}, ${{ needs.init-and-test.outputs.full_sha }}"

  deploy:
    runs-on: ubuntu-latest
    needs: [init-and-test, build]
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Update manifest and push
        run: |
          cd deploy_manifest
          sed -i "s|image: .*worklog-backend:.*|image: ${{ env.DOCKER_REPOSITORY }}:${{ needs.init-and-test.outputs.short_sha }}|" worklog-backend.yaml
          sed -i "s|value: .* # IMAGE_TAG|value: ${{ needs.init-and-test.outputs.short_sha }} # IMAGE_TAG|" worklog-backend.yaml
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m "deploy: update image tag to ${{ needs.init-and-test.outputs.short_sha }}"
          git pull --rebase origin main
          git push origin main

  notify-success-result:
    if: ${{ success() }}
    runs-on: ubuntu-latest
    needs: [init-and-test, build, deploy]
    steps:
      - name: Slack Notification Success
        run: |
          echo "Your pipeline has been completed"
          echo "Commit Message: ${{ needs.init-and-test.outputs.commit_message }}"
          echo "Tags: ${{ needs.init-and-test.outputs.short_sha }}, ${{ needs.init-and-test.outputs.full_sha }}"

  notify-failure-result:
    if: ${{ failure() }}
    runs-on: ubuntu-latest
    needs: [init-and-test, build, deploy]
    steps:
      - name: Slack Notification Failure
        run: |
          echo "Your pipeline has been failed"
          echo "Commit Message: ${{ needs.init-and-test.outputs.commit_message }}"
          echo "Tags: ${{ needs.init-and-test.outputs.short_sha }}, ${{ needs.init-and-test.outputs.full_sha }}"
